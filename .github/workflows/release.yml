name: Release ForgeBook

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Validate tag matches package version
        shell: pwsh
        run: |
          $package = Get-Content package.json | ConvertFrom-Json
          $expectedTag = "v$($package.version)"
          if ($env:GITHUB_REF_NAME -ne $expectedTag) {
            throw "Tag $env:GITHUB_REF_NAME does not match package.json version $($package.version)."
          }

      - name: Build Windows release assets
        run: npm run release:windows

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/ForgeBook-Setup-*.exe
            release-assets/ForgeBook-Portable-*.zip
